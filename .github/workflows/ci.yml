name: CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build-and-test:
    if: github.event_name == 'pull_request'
    uses: Bielov-Team-Track/devops/.github/workflows/build-dotnet-service.yml@main
    with:
      service-name: coaching-service
      service-path: '.'
      project-name: Coaching
      solution-file: Coaching.slnx
      port: '5060'
      run-tests: true
      push-docker-image: false
      build-migration-bundle: false
    secrets: inherit

  build-push:
    if: github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/build-dotnet-service.yml@main
    with:
      service-name: coaching-service
      service-path: '.'
      project-name: Coaching
      solution-file: Coaching.slnx
      port: '5060'
      run-tests: true
      push-docker-image: true
      build-migration-bundle: true
    secrets: inherit
    permissions:
      contents: read
      packages: write

  deploy-staging:
    needs: build-push
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/deploy-service.yml@main
    with:
      service-name: coaching-service
      environment: staging
      has-migrations: true
    secrets: inherit

  deploy-production:
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/deploy-service.yml@main
    with:
      service-name: coaching-service
      environment: production
      has-migrations: true
    secrets: inherit
