name: CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

permissions: {}

jobs:
  build-and-test:
    uses: Bielov-Team-Track/devops/.github/workflows/build-dotnet-service.yml@main
    permissions:
      contents: read
    with:
      service-name: coaching-service
      service-path: '.'
      project-name: Coaching
      solution-file: Coaching.slnx
      port: '5060'
      run-tests: true
      push-docker-image: false
      build-migration-bundle: false
    secrets: inherit

  build-push:
    needs: build-and-test
    if: github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/build-dotnet-service.yml@main
    permissions:
      contents: read
      packages: write
    with:
      service-name: coaching-service
      service-path: '.'
      project-name: Coaching
      solution-file: Coaching.slnx
      port: '5060'
      run-tests: false
      push-docker-image: true
      build-migration-bundle: true
      telegram-message-id: ${{ needs.build-and-test.outputs.telegram-message-id }}
      telegram-message-lines: ${{ needs.build-and-test.outputs.telegram-message-lines }}
    secrets: inherit

  integration-tests:
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/integration-tests.yml@main
    permissions:
      contents: read
    with:
      service-name: coaching-service
      service-path: '.'
      project-name: Coaching
      solution-file: Coaching.slnx
      telegram-message-id: ${{ needs.build-push.outputs.telegram-message-id }}
      telegram-message-lines: ${{ needs.build-push.outputs.telegram-message-lines }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  deploy-staging:
    needs: build-push
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/deploy-service.yml@main
    permissions:
      contents: read
    with:
      service-name: coaching-service
      environment: staging
      has-migrations: true
      telegram-message-id: ${{ needs.build-push.outputs.telegram-message-id }}
      telegram-message-lines: ${{ needs.build-push.outputs.telegram-message-lines }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_FINGERPRINT: ${{ secrets.SSH_FINGERPRINT }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  deploy-production:
    needs: [build-push, integration-tests]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.build-push.result == 'success' && (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
    uses: Bielov-Team-Track/devops/.github/workflows/deploy-service.yml@main
    permissions:
      contents: read
    with:
      service-name: coaching-service
      environment: production
      has-migrations: true
      telegram-message-id: ${{ needs.integration-tests.outputs.telegram-message-id || needs.build-push.outputs.telegram-message-id }}
      telegram-message-lines: ${{ needs.integration-tests.outputs.telegram-message-lines || needs.build-push.outputs.telegram-message-lines }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_FINGERPRINT: ${{ secrets.SSH_FINGERPRINT }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
