name: CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-and-test:
    uses: Bielov-Team-Track/devops/.github/workflows/build-dotnet-service.yml@main
    permissions:
      contents: read
    with:
      service-name: coaching-service
      service-path: '.'
      project-name: Coaching
      solution-file: Coaching.slnx
      port: '5060'
      run-tests: true
      push-docker-image: false
      build-migration-bundle: false
      environment: ${{ github.ref == 'refs/heads/development' && 'staging' || github.ref == 'refs/heads/main' && 'production' || '' }}
    secrets: inherit

  build-push:
    needs: build-and-test
    if: github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/build-dotnet-service.yml@main
    permissions:
      contents: read
      packages: write
    with:
      service-name: coaching-service
      service-path: '.'
      project-name: Coaching
      solution-file: Coaching.slnx
      port: '5060'
      run-tests: false
      push-docker-image: true
      build-migration-bundle: true
      environment: ${{ github.ref == 'refs/heads/development' && 'staging' || github.ref == 'refs/heads/main' && 'production' || '' }}
    secrets: inherit

  integration-tests:
    needs: build-push
    if: github.event_name == 'push'
    uses: Bielov-Team-Track/devops/.github/workflows/integration-tests.yml@main
    permissions:
      contents: read
    with:
      service-name: coaching-service
      service-path: '.'
      project-name: Coaching
      solution-file: Coaching.slnx
      environment: ${{ github.ref == 'refs/heads/development' && 'staging' || 'production' }}

  deploy-staging:
    needs: [build-push, integration-tests]
    if: always() && github.ref == 'refs/heads/development' && github.event_name == 'push' && needs.build-push.result == 'success' && (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
    uses: Bielov-Team-Track/devops/.github/workflows/deploy-service.yml@main
    permissions:
      contents: read
    with:
      service-name: coaching-service
      environment: staging
      has-migrations: true
    secrets: inherit

  deploy-production:
    needs: [build-push, integration-tests]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.build-push.result == 'success' && (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
    uses: Bielov-Team-Track/devops/.github/workflows/deploy-service.yml@main
    permissions:
      contents: read
    with:
      service-name: coaching-service
      environment: production
      has-migrations: true
    secrets: inherit
